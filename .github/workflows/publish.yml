name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: |
          current="$(node -p "require('./package.json').version")"
          target="${GITHUB_REF_NAME#v}"
          if [ "$current" != "$target" ]; then
            npm version "$GITHUB_REF_NAME" --no-git-tag-version
          else
            echo "package.json already at $current, skipping bump"
          fi
      - run: bun run scripts/changelog-release.ts
      - run: bun run build
      - run: npm publish --access public --ignore-scripts --provenance
